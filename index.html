<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0612" />
<title>NEON BOXER — Idle</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0a0612;
    --magenta:#ff2d75;
    --magenta-glow:#ff0080;
    --cyan:#00e5ff;
    --gold:#ffd23f;
    --green:#37ffb4;
    --ink:#f4ecff;
    --panel:rgba(22,12,38,.62);
    --panel-brd:rgba(255,255,255,.10);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:'Rajdhani',sans-serif;-webkit-user-select:none;user-select:none;}
  #app{position:fixed;inset:0;}
  canvas{display:block;position:fixed;inset:0;width:100%;height:100%;touch-action:none;cursor:pointer;}

  /* ===== Top HUD ===== */
  .hud-top{
    position:fixed;top:0;left:0;right:0;z-index:10;
    padding:calc(env(safe-area-inset-top) + 14px) 16px 10px;
    display:flex;flex-direction:column;align-items:center;gap:2px;
    pointer-events:none;
    background:linear-gradient(180deg,rgba(10,6,18,.85) 0%,rgba(10,6,18,0) 100%);
  }
  .brand{
    font-family:'Anton',sans-serif;font-size:13px;letter-spacing:.42em;
    text-transform:uppercase;color:var(--cyan);opacity:.85;
    text-shadow:0 0 12px var(--cyan);
    margin-left:.42em;
  }
  .money{
    font-family:'Anton',sans-serif;font-size:clamp(34px,11vw,52px);line-height:1;
    letter-spacing:.01em;color:var(--gold);
    text-shadow:0 0 22px rgba(255,210,63,.55),0 2px 0 rgba(0,0,0,.4);
    display:flex;align-items:baseline;gap:.12em;
  }
  .money .cur{font-size:.5em;opacity:.7;color:var(--gold);text-shadow:none;}
  .rate{
    font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:var(--green);text-shadow:0 0 14px rgba(55,255,180,.5);
  }
  .rate b{color:#fff;}
  .tap-hint{
    margin-top:4px;font-size:12px;font-weight:700;letter-spacing:.22em;
    text-transform:uppercase;color:var(--magenta);opacity:.9;
    text-shadow:0 0 12px var(--magenta-glow);
    animation:hintpulse 1.3s ease-in-out infinite;transition:opacity .5s;
  }
  @keyframes hintpulse{50%{opacity:.4;}}
  .fame-chip{
    margin-top:7px;pointer-events:auto;cursor:pointer;border:none;
    display:inline-flex;align-items:center;gap:6px;padding:5px 13px;border-radius:20px;
    background:var(--panel);border:1px solid rgba(255,210,63,.35);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    font-family:'Anton',sans-serif;font-size:13px;letter-spacing:.06em;color:var(--gold);
    text-shadow:0 0 10px rgba(255,210,63,.5);box-shadow:0 0 16px rgba(255,210,63,.18);
    transition:transform .1s ease;
  }
  .fame-chip:active{transform:scale(.93);}
  .fame-chip .rdy{width:8px;height:8px;border-radius:50%;background:var(--green);
    box-shadow:0 0 9px var(--green);display:none;}
  .fame-chip.ready{border-color:rgba(55,255,180,.6);}
  .fame-chip.ready .rdy{display:inline-block;animation:bdg 1s infinite;}

  /* prestige sheet bits */
  .pr-hero{text-align:center;padding:6px 0 16px;}
  .pr-hero .big{font-family:'Anton',sans-serif;font-size:clamp(44px,16vw,80px);line-height:.9;
    color:var(--gold);text-shadow:0 0 28px rgba(255,210,63,.6);}
  .pr-hero .sub{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:rgba(244,236,255,.6);margin-top:4px;}
  .pr-rows{display:grid;gap:10px;margin-bottom:16px;}
  .pr-row{display:flex;justify-content:space-between;align-items:center;
    background:rgba(255,255,255,.04);border:1px solid var(--panel-brd);border-radius:14px;padding:12px 15px;}
  .pr-row .l{font-size:13px;letter-spacing:.04em;color:rgba(244,236,255,.65);text-transform:uppercase;}
  .pr-row .v{font-family:'Anton',sans-serif;font-size:20px;color:var(--ink);}
  .pr-row .v.gain{color:var(--green);text-shadow:0 0 12px rgba(55,255,180,.5);}
  .pr-btn{
    width:100%;border:none;border-radius:18px;padding:18px;cursor:pointer;
    font-family:'Anton',sans-serif;font-size:20px;letter-spacing:.12em;text-transform:uppercase;color:#1a0a04;
    background:linear-gradient(135deg,var(--gold),#ff8a3d);
    box-shadow:0 0 30px rgba(255,210,63,.5);transition:transform .1s ease,filter .2s;
  }
  .pr-btn:active{transform:scale(.97);}
  .pr-btn:disabled{background:rgba(255,255,255,.08);color:rgba(255,255,255,.35);box-shadow:none;cursor:default;}
  .pr-btn.confirm{background:linear-gradient(135deg,#ff2d75,#ff5200);color:#fff;animation:bdg .7s infinite;}
  .pr-note{font-size:12px;color:rgba(244,236,255,.45);text-align:center;margin-top:12px;line-height:1.5;}

  /* combo / hit popups projected over canvas */
  #popups{position:fixed;inset:0;z-index:8;pointer-events:none;overflow:hidden;}
  .pop{
    position:absolute;transform:translate(-50%,-50%);
    font-family:'Anton',sans-serif;font-size:22px;color:var(--gold);
    text-shadow:0 0 12px rgba(255,210,63,.8),0 2px 4px rgba(0,0,0,.6);
    animation:floatUp .9s ease-out forwards;white-space:nowrap;
  }
  @keyframes floatUp{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.6);}
    18%{opacity:1;transform:translate(-50%,-90%) scale(1.12);}
    100%{opacity:0;transform:translate(-50%,-220%) scale(.95);}
  }

  /* ===== Combo meter ===== */
  #combo{
    position:fixed;left:50%;top:27%;transform:translateX(-50%);z-index:9;
    pointer-events:none;text-align:center;opacity:0;transition:opacity .25s;
    filter:drop-shadow(0 6px 18px rgba(0,0,0,.5));
  }
  #combo.on{opacity:1;}
  #combo .n{
    font-family:'Anton',sans-serif;line-height:.85;
    font-size:clamp(46px,17vw,92px);
    color:var(--c,var(--magenta));
    text-shadow:0 0 26px var(--c,var(--magenta-glow)),0 0 6px rgba(255,255,255,.4);
  }
  #combo .n small{font-size:.42em;opacity:.85;margin-left:.04em;}
  #combo.bump .n{animation:cbump .19s cubic-bezier(.3,1.6,.5,1);}
  @keyframes cbump{0%{transform:scale(.82);}55%{transform:scale(1.22);}100%{transform:scale(1);}}
  #combo .x{
    font-family:'Anton',sans-serif;font-size:clamp(15px,4.6vw,22px);
    letter-spacing:.18em;color:var(--gold);text-transform:uppercase;margin-top:2px;
    text-shadow:0 0 14px rgba(255,210,63,.6);
  }
  #combo .bar{
    width:min(46vw,180px);height:7px;border-radius:4px;margin:9px auto 0;
    background:rgba(255,255,255,.14);overflow:hidden;
    box-shadow:inset 0 0 6px rgba(0,0,0,.5);
  }
  #combo .bar i{display:block;height:100%;width:100%;border-radius:4px;
    background:linear-gradient(90deg,var(--c,var(--magenta)),var(--gold));
    transform-origin:left;transition:transform .08s linear;}

  /* ===== Bottom upgrade dock ===== */
  .dock{
    position:fixed;left:0;right:0;bottom:0;z-index:10;
    padding:14px 12px calc(env(safe-area-inset-bottom) + 16px);
    display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
    background:linear-gradient(0deg,rgba(10,6,18,.92) 30%,rgba(10,6,18,0) 100%);
  }
  .up{
    position:relative;border:none;cursor:pointer;
    border-radius:18px;padding:13px 8px 11px;
    background:var(--panel);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid var(--panel-brd);
    box-shadow:0 8px 26px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.07);
    color:var(--ink);text-align:center;
    display:flex;flex-direction:column;align-items:center;gap:5px;
    transition:transform .08s ease, box-shadow .15s ease, filter .15s ease;
    overflow:hidden;
  }
  .up::before{
    content:"";position:absolute;inset:0;border-radius:18px;padding:1px;
    background:linear-gradient(160deg,var(--c) ,transparent 55%);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;opacity:.9;pointer-events:none;
  }
  .up:active{transform:translateY(2px) scale(.97);}
  .up.flash{animation:btnflash .4s ease;}
  @keyframes btnflash{0%{box-shadow:0 0 0 0 var(--c);}100%{box-shadow:0 0 0 14px transparent;}}
  .up.cant{filter:saturate(.45) brightness(.7);}
  .up .ic{
    width:42px;height:42px;border-radius:13px;display:grid;place-items:center;
    font-size:22px;
    background:radial-gradient(circle at 50% 35%,color-mix(in srgb,var(--c) 55%,transparent),transparent 70%);
    box-shadow:0 0 18px color-mix(in srgb,var(--c) 60%,transparent);
  }
  .up .nm{font-family:'Anton',sans-serif;font-size:13px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--c);text-shadow:0 0 10px color-mix(in srgb,var(--c) 70%,transparent);}
  .up .lv{font-size:12px;font-weight:700;letter-spacing:.05em;opacity:.7;text-transform:uppercase;}
  .up .cost{
    margin-top:2px;font-family:'Anton',sans-serif;font-size:15px;letter-spacing:.02em;
    color:#fff;display:flex;align-items:center;gap:3px;
  }
  .up .cost .c{color:var(--gold);font-size:.8em;}
  .up.cant .cost{color:var(--magenta);}

  /* boot / loader */
  #boot{position:fixed;inset:0;z-index:30;display:grid;place-items:center;
    background:radial-gradient(120% 90% at 50% 20%,#1a0a2e,#0a0612 70%);}
  #boot .t{font-family:'Anton',sans-serif;font-size:40px;letter-spacing:.18em;
    color:var(--magenta);text-shadow:0 0 26px var(--magenta-glow);text-align:center;}
  #boot .s{margin-top:10px;text-align:center;letter-spacing:.4em;font-size:12px;
    color:var(--cyan);text-transform:uppercase;animation:pulse 1.1s infinite;}
  @keyframes pulse{50%{opacity:.35;}}

  .g-toast{
    position:fixed;left:50%;top:38%;transform:translateX(-50%);z-index:20;
    background:var(--panel);border:1px solid var(--panel-brd);backdrop-filter:blur(14px);
    border-radius:16px;padding:16px 22px;text-align:center;pointer-events:none;
    box-shadow:0 10px 40px rgba(0,0,0,.6);animation:toast 3.4s ease forwards;
  }
  .g-toast .h{font-family:'Anton',sans-serif;color:var(--cyan);letter-spacing:.2em;font-size:14px;}
  .g-toast .v{font-family:'Anton',sans-serif;color:var(--gold);font-size:26px;margin-top:4px;}
  @keyframes toast{0%{opacity:0;transform:translate(-50%,10px);}10%,80%{opacity:1;transform:translate(-50%,0);}100%{opacity:0;transform:translate(-50%,-12px);}}

  /* ===== Corner menu buttons ===== */
  .corner{
    position:fixed;top:calc(env(safe-area-inset-top) + 12px);z-index:12;
    width:50px;height:50px;border:none;border-radius:15px;cursor:pointer;
    background:var(--panel);border:1px solid var(--panel-brd);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    box-shadow:0 6px 20px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.07);
    display:grid;place-items:center;font-size:23px;
    transition:transform .1s ease;
  }
  .corner:active{transform:scale(.9);}
  #btnStats{left:14px;}
  #btnQuests{right:14px;}
  .corner .badge{
    position:absolute;top:-6px;right:-6px;min-width:20px;height:20px;padding:0 5px;
    border-radius:10px;background:var(--magenta);color:#fff;
    font-family:'Anton',sans-serif;font-size:12px;display:none;place-items:center;
    box-shadow:0 0 12px var(--magenta-glow);animation:bdg 1s ease-in-out infinite;
  }
  .corner .badge.show{display:grid;}
  @keyframes bdg{50%{transform:scale(1.15);}}

  /* ===== Bottom sheet ===== */
  #sheetWrap{position:fixed;inset:0;z-index:25;display:none;}
  #sheetWrap.open{display:block;}
  #sheetWrap .bd{position:absolute;inset:0;background:rgba(5,3,10,.6);backdrop-filter:blur(3px);
    animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .sheet{
    position:absolute;left:0;right:0;bottom:0;max-height:82vh;overflow-y:auto;
    background:linear-gradient(180deg,#1a0e2e,#0d0718);
    border-top-left-radius:26px;border-top-right-radius:26px;
    border-top:1px solid var(--panel-brd);
    box-shadow:0 -16px 50px rgba(0,0,0,.6);
    padding:10px 16px calc(env(safe-area-inset-bottom) + 24px);
    animation:slideUp .3s cubic-bezier(.2,.9,.3,1);
  }
  @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .sheet .grip{width:44px;height:5px;border-radius:3px;background:rgba(255,255,255,.22);margin:6px auto 12px;}
  .sheet h2{font-family:'Anton',sans-serif;letter-spacing:.12em;text-transform:uppercase;
    font-size:22px;color:var(--ink);margin-bottom:14px;text-align:center;}
  .sheet h2 span{color:var(--cyan);text-shadow:0 0 14px var(--cyan);}

  /* quest rows */
  .quest{
    display:flex;align-items:center;gap:12px;padding:12px;margin-bottom:10px;
    background:rgba(255,255,255,.04);border:1px solid var(--panel-brd);border-radius:16px;
  }
  .quest.done{border-color:rgba(55,255,180,.4);}
  .quest .qi{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-size:20px;
    background:radial-gradient(circle at 50% 35%,rgba(255,45,117,.4),transparent 70%);flex:0 0 auto;}
  .quest .qb{flex:1;min-width:0;}
  .quest .qn{font-weight:700;font-size:15px;letter-spacing:.02em;color:var(--ink);}
  .quest .qd{font-size:12px;color:rgba(244,236,255,.55);margin-bottom:6px;}
  .quest .qbar{height:7px;border-radius:4px;background:rgba(255,255,255,.1);overflow:hidden;}
  .quest .qbar i{display:block;height:100%;border-radius:4px;
    background:linear-gradient(90deg,var(--magenta),var(--gold));}
  .quest .qr{font-family:'Anton',sans-serif;font-size:13px;color:var(--gold);margin-top:5px;}
  .quest .claim{
    flex:0 0 auto;border:none;border-radius:12px;padding:10px 14px;cursor:pointer;
    font-family:'Anton',sans-serif;font-size:13px;letter-spacing:.06em;color:#0d0718;
    background:linear-gradient(135deg,var(--green),#00e5ff);box-shadow:0 0 18px rgba(55,255,180,.5);
  }
  .quest .claim:active{transform:scale(.94);}
  .quest .claim:disabled{background:rgba(255,255,255,.1);color:rgba(255,255,255,.4);box-shadow:none;cursor:default;}
  .quest.claimed .claim{background:rgba(55,255,180,.15);color:var(--green);box-shadow:none;}

  /* stat cards */
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .stat{background:rgba(255,255,255,.04);border:1px solid var(--panel-brd);border-radius:16px;padding:13px;}
  .stat .sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(244,236,255,.5);}
  .stat .sv{font-family:'Anton',sans-serif;font-size:24px;color:var(--gold);margin-top:3px;line-height:1;}
  .stat.cy .sv{color:var(--cyan);} .stat.mg .sv{color:var(--magenta);} .stat.gr .sv{color:var(--green);}

  /* ===== Combo perks ===== */
  #frenzy{position:fixed;inset:0;z-index:6;pointer-events:none;opacity:0;transition:opacity .3s;
    box-shadow:inset 0 0 140px 30px rgba(255,45,117,.55);}
  #frenzy.on{opacity:1;animation:frz 1.1s ease-in-out infinite;}
  @keyframes frz{50%{box-shadow:inset 0 0 180px 50px rgba(255,210,63,.6);}}
  #frenzyTag{
    position:fixed;left:50%;top:16%;transform:translateX(-50%);z-index:11;pointer-events:none;
    font-family:'Anton',sans-serif;letter-spacing:.14em;font-size:16px;display:none;
    color:var(--gold);text-shadow:0 0 16px var(--magenta-glow);text-transform:uppercase;
  }
  #frenzyTag.on{display:block;}
  #perkBanner{
    position:fixed;left:50%;top:44%;transform:translate(-50%,-50%) scale(.6);z-index:21;
    pointer-events:none;text-align:center;opacity:0;
  }
  #perkBanner.show{animation:perk 1.4s cubic-bezier(.2,1.4,.4,1) forwards;}
  @keyframes perk{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.4) rotate(-6deg);}
    20%{opacity:1;transform:translate(-50%,-50%) scale(1.15) rotate(2deg);}
    75%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0);}
    100%{opacity:0;transform:translate(-50%,-130%) scale(.95);}
  }
  #perkBanner .pt{font-family:'Anton',sans-serif;font-size:clamp(40px,14vw,72px);line-height:.9;
    color:var(--magenta);text-shadow:0 0 30px var(--magenta-glow),0 0 8px #fff;}
  #perkBanner .ps{font-family:'Anton',sans-serif;font-size:clamp(16px,5vw,24px);color:var(--gold);
    letter-spacing:.1em;text-shadow:0 0 14px rgba(255,210,63,.6);margin-top:4px;}
</style>
</head>
<body>
<div id="app"></div>

<div id="boot"><div><div class="t">NEON BOXER</div><div class="s">Entrée dans l'arène…</div></div></div>

<div class="hud-top">
  <div class="brand">Neon Boxer Club</div>
  <div class="money"><span class="cur">$</span><span id="money">0</span></div>
  <div class="rate">+<b id="rate">0</b>/s · idle</div>
  <div class="tap-hint" id="tapHint">👆 Tape l'écran pour frapper</div>
  <button class="fame-chip no-punch" id="fameChip"><span class="rdy"></span>⭐ <span id="fameMult">×1.0</span></button>
</div>

<div id="popups"></div>

<button class="corner no-punch" id="btnStats">📊</button>
<button class="corner no-punch" id="btnQuests">🏆<span class="badge" id="qBadge">0</span></button>

<div id="frenzy"></div>
<div id="frenzyTag" class="no-punch"></div>
<div id="perkBanner"><div class="pt" id="perkT">RAGE</div><div class="ps" id="perkS"></div></div>

<div id="sheetWrap" class="no-punch">
  <div class="bd" id="sheetBd"></div>
  <div class="sheet">
    <div class="grip"></div>
    <h2 id="sheetTitle"></h2>
    <div id="sheetBody"></div>
  </div>
</div>

<div id="combo">
  <div class="n"><span id="comboN">0</span><small>×</small></div>
  <div class="x">Combo · ×<span id="comboMult">1.0</span> $</div>
  <div class="bar"><i id="comboBar"></i></div>
</div>

<div class="dock">
  <button class="up" id="up-force" style="--c:var(--magenta)">
    <div class="ic">🥊</div>
    <div class="nm">Force</div>
    <div class="lv">Niv <span id="lvl-force">1</span></div>
    <div class="cost"><span class="c">$</span><span id="cost-force">10</span></div>
  </button>
  <button class="up" id="up-stamina" style="--c:var(--cyan)">
    <div class="ic">⚡</div>
    <div class="nm">Stamina</div>
    <div class="lv">Niv <span id="lvl-stamina">1</span></div>
    <div class="cost"><span class="c">$</span><span id="cost-stamina">15</span></div>
  </button>
  <button class="up" id="up-income" style="--c:var(--gold)">
    <div class="ic">💰</div>
    <div class="nm">Income</div>
    <div class="lv">Niv <span id="lvl-income">1</span></div>
    <div class="cost"><span class="c">$</span><span id="cost-income">25</span></div>
  </button>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

/* ===================================================================
   GAME STATE
=================================================================== */
const SAVE_KEY = 'neonboxer_save_v1';
const state = {
  money: 0,
  force: 1,    // damage tier
  stamina: 1,  // punch speed tier
  income: 1,   // money multiplier tier
  lastSeen: Date.now(),
  stats: { punches:0, manual:0, bestCombo:0, earned:0, started:Date.now() },
  quests: {},  // id -> claimed
  fame: 0,     // prestige points (permanent)
  run: 0,      // money earned this run (drives next prestige)
};

const COST = {
  force:   l => Math.floor(10 * Math.pow(1.18, l - 1)),
  stamina: l => Math.floor(15 * Math.pow(1.20, l - 1)),
  income:  l => Math.floor(25 * Math.pow(1.26, l - 1)),
};
const damage      = () => state.force;
const incomeMult  = () => 1 + 0.25 * (state.income - 1);
const fameMult    = () => 1 + 0.10 * state.fame;           // +10% income / Renommée
const moneyPerHit = () => damage() * incomeMult() * fameMult();
const punchRate   = () => 0.9 + 0.13 * (state.stamina - 1); // punches / sec

// prestige: points gained on reset, from money earned this run
const PRESTIGE_BASE = 1e4;
const prestigeGain  = () => Math.floor(Math.sqrt(Math.max(0, state.run) / PRESTIGE_BASE));

// single money sink: balance + lifetime + this-run all at once
function gainMoney(a){ state.money += a; state.stats.earned += a; state.run += a; }

function load(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return;
    const s = JSON.parse(raw);
    Object.assign(state, s);
    // offline earnings
    const dt = Math.min((Date.now() - (s.lastSeen||Date.now()))/1000, 8*3600);
    const earned = dt * moneyPerHit() * punchRate();
    if(earned > 1){ state.money += earned; pendingOffline = earned; state.stats.earned += earned; state.run += earned; }
  }catch(e){}
}
// guarantee nested defaults survive older saves
function normalize(){
  state.stats  = Object.assign({ punches:0, manual:0, bestCombo:0, earned:0, started:Date.now() }, state.stats||{});
  state.quests = state.quests || {};
  state.fame = state.fame || 0;
  state.run  = state.run  || 0;
}
function save(){
  state.lastSeen = Date.now();
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }catch(e){}
}
let pendingOffline = 0;
load();
normalize();

// physique scaling: 0 = skinny stickman, 1 = max buff (hard cap)
const physiqueUpdaters = [];
function scalable(mesh, min, max){
  if(Array.isArray(min)){
    physiqueUpdaters.push(p=>mesh.scale.set(
      min[0]+(max[0]-min[0])*p, min[1]+(max[1]-min[1])*p, min[2]+(max[2]-min[2])*p));
  } else {
    physiqueUpdaters.push(p=>mesh.scale.setScalar(min+(max-min)*p));
  }
  return mesh;
}
// muscle that lerps BOTH position and scale with physique, so it hugs the
// thin skeleton when skinny and bulges OUTWARD as it grows (no floating).
function lerpPart(mesh, parent, posMin, posMax, sMin, sMax){
  parent.add(mesh);
  const arr = Array.isArray(sMin);
  physiqueUpdaters.push(p=>{
    mesh.position.set(
      posMin[0]+(posMax[0]-posMin[0])*p,
      posMin[1]+(posMax[1]-posMin[1])*p,
      posMin[2]+(posMax[2]-posMin[2])*p);
    if(arr) mesh.scale.set(
      sMin[0]+(sMax[0]-sMin[0])*p, sMin[1]+(sMax[1]-sMin[1])*p, sMin[2]+(sMax[2]-sMin[2])*p);
    else mesh.scale.setScalar(sMin+(sMax-sMin)*p);
  });
  return mesh;
}

function burst(pos, big){
  const n = (big?16:10) + Math.floor(Math.random()*6);
  for(let i=0;i<n;i++){
    const p = pPool[pIdx]; pIdx=(pIdx+1)%PCOUNT;
    p.m.position.copy(pos);
    p.m.material.color.setHex(impactColors[(Math.random()*impactColors.length)|0]);
    p.m.material.opacity=1; p.m.visible=true;
    const sp = 2 + Math.random()*3;
    p.vel.set((Math.random()-0.5)*sp, Math.random()*sp*0.9+0.5, (Math.random()-0.5)*sp + 1.5);
    p.life = 0.5 + Math.random()*0.3;
  }
}

// ---- COMBO multiplier (manual taps only) ----
let combo = 0, comboTimer = 0;
const comboWindow = () => 1.6 + state.stamina * 0.04;          // stamina = more grace time
const comboMult   = () => 1 + Math.min(combo * 0.12, 6);       // up to ×7
const comboEl   = document.getElementById('combo');
const comboNEl  = document.getElementById('comboN');
const comboMEl  = document.getElementById('comboMult');
const comboBar  = document.getElementById('comboBar');
function comboColor(){
  if(combo >= 40) return 'var(--cyan)';
  if(combo >= 18) return 'var(--gold)';
  return 'var(--magenta)';
}
function updateComboUI(){
  if(combo > 0){
    comboEl.classList.add('on');
    comboEl.style.setProperty('--c', comboColor());
    comboNEl.textContent = combo;
    comboMEl.textContent = comboMult().toFixed(1);
    comboBar.style.transform = 'scaleX('+Math.max(0, comboTimer/comboWindow())+')';
  } else {
    comboEl.classList.remove('on');
  }
}

function triggerPunch(manual){
  let right;
  if(manual){ right = nextManual; nextManual = !nextManual; }
  else right = Math.random() > 0.5;
  activePunch = { arm: right?armR:armL, side: right?1:-1, t:0, hit:false, manual:!!manual };
}

// ---- player tap = punch ----
function playerPunch(){
  if(activePunch) return;          // wait for current jab to finish
  triggerPunch(true);
}
window.addEventListener('pointerdown', (e)=>{
  if(sheetOpen) return;                                  // menu open, ignore
  if(e.target.closest('.dock,.no-punch')) return;        // buttons & menus don't punch
  playerPunch();
}, { passive:true });

let firstTap = true;
function onImpact(){
  const manual = activePunch.manual;
  if(manual){
    combo++; comboTimer = comboWindow();
    if(combo > state.stats.bestCombo) state.stats.bestCombo = combo;
    comboEl.classList.remove('bump'); void comboEl.offsetWidth; comboEl.classList.add('bump');
    updateComboUI();
    triggerPerks(combo);
  }
  const mult = manual ? comboMult() : 1;
  const gain = moneyPerHit() * (manual ? 1.5 : 1) * mult * frenzyMult;   // active + combo + perk
  gainMoney(gain);
  state.stats.punches++;
  if(manual) state.stats.manual++;

  activePunch.arm.glove.getWorldPosition(gloveWorld);
  burst(gloveWorld, manual);
  popup(gloveWorld, '+$'+fmt(gain) + (manual && combo>1 ? '  ×'+mult.toFixed(1) : ''));

  // shove bag (manual + combo hits harder)
  const power = (manual ? 1.5 : 1) + Math.min(combo*0.02, 1);
  bagSwing.vz += (4.2 + damage()*0.04) * power;
  bagSwing.vx += (Math.random()-0.5)*1.5;
  shake = Math.min(0.36, (manual?0.18:0.12) + damage()*0.002 + Math.min(combo*0.004,0.14));
  ringPulse = 1;

  if(manual && firstTap){
    firstTap = false;
    const h = document.getElementById('tapHint');
    if(h){ h.style.opacity='0'; setTimeout(()=>h.remove(), 600); }
  }
}

/* ===================================================================
   COMBO PERKS  (frenzy mult, freeze, coin rain)
=================================================================== */
let frenzyMult = 1, frenzyTimer = 0, comboFreeze = 0;
const frenzyEl  = document.getElementById('frenzy');
const frenzyTag = document.getElementById('frenzyTag');
const perkEl = document.getElementById('perkBanner');
const _vp = new THREE.Vector3();

const PERKS = [
  { at:25,  t:'BOOST',       s:'Cash ×2 · 5s',            run:()=>grantFrenzy(2,5) },
  { at:50,  t:'RAGE',        s:'Cash ×3 · 6s',            run:()=>{ grantFrenzy(3,6); shake=0.42; } },
  { at:75,  t:"PLUIE D'OR",  s:'Bonus cash !',            run:()=>coinRain() },
  { at:100, t:'OVERDRIVE',   s:'Cash ×5 · 8s · combo gelé', run:()=>{ grantFrenzy(5,8); freezeCombo(4); } },
];
function triggerPerks(c){
  for(const p of PERKS){ if(c===p.at){ p.run(); showPerk(p.t,p.s); navigator.vibrate?.([20,40,30]); } }
  if(c>100 && c%50===0){ coinRain(); showPerk("PLUIE D'OR",'Combo '+c+' !'); navigator.vibrate?.([20,40,30]); }
}
function grantFrenzy(m,sec){
  frenzyMult = Math.max(frenzyMult, m);
  frenzyTimer = Math.max(frenzyTimer, sec);
  frenzyEl.classList.add('on'); frenzyTag.classList.add('on');
}
function freezeCombo(sec){ comboFreeze = Math.max(comboFreeze, sec); }
function coinRain(){
  const total = moneyPerHit() * 30 * frenzyMult;
  gainMoney(total);
  bagBody.getWorldPosition(_vp);
  for(let i=0;i<14;i++) setTimeout(()=>{
    const off = new THREE.Vector3((Math.random()-.5)*1.7, Math.random()*1.5, (Math.random()-.5)*0.6);
    popup(_vp.clone().add(off), '+$'+fmt(total/14));
  }, i*55);
  burst(_vp, true);
}
function showPerk(t,s){
  document.getElementById('perkT').textContent = t;
  document.getElementById('perkS').textContent = s;
  perkEl.classList.remove('show'); void perkEl.offsetWidth; perkEl.classList.add('show');
}

/* ===================================================================
   FLOATING POPUPS (DOM projected)
=================================================================== */
const popLayer = document.getElementById('popups');
const _v = new THREE.Vector3();
function popup(pos3, text){
  _v.copy(pos3).project(camera);
  const x = (_v.x*0.5+0.5)*window.innerWidth;
  const y = (-_v.y*0.5+0.5)*window.innerHeight;
  const el = document.createElement('div');
  el.className='pop'; el.textContent=text;
  el.style.left=x+'px'; el.style.top=y+'px';
  el.style.color = Math.random()>0.7 ? 'var(--cyan)' : 'var(--gold)';
  popLayer.appendChild(el);
  setTimeout(()=>el.remove(), 900);
}

// reusable center toast
function toast(h, v){
  const t = document.createElement('div');
  t.className = 'g-toast';
  t.innerHTML = '<div class="h">'+h+'</div><div class="v">'+v+'</div>';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3400);
}

/* ===================================================================
   RENDER LOOP
=================================================================== */
let shake=0, ringPulse=0;
const clock = new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  // ---- punch scheduling ----
  punchCd -= dt;
  if(punchCd <= 0 && !activePunch){
    triggerPunch();
    punchCd = 1 / punchRate();
  }

  // ---- punch animation ----
  if(activePunch){
    const a = activePunch; a.t += dt * (a.manual ? punchAnimSpeed()*1.25 : punchAnimSpeed());
    const s = a.side;
    if(a.t < 1){
      // extend toward bag: ease out
      const e = 1 - Math.pow(1-a.t, 3);
      a.arm.pivot.rotation.x = -1.15 + e*1.05;        // swing forward
      a.arm.pivot.rotation.z = (0.55 - e*0.55)*s;      // straighten
      a.arm.pivot.rotation.y = (0.25 - e*0.25)*s;
      if(e > 0.82 && !a.hit){ a.hit=true; onImpact(); }
    } else if(a.t < 2){
      // retract back to guard
      const e = a.t-1;
      a.arm.pivot.rotation.x = -1.15 + (1-e)*1.05;
      a.arm.pivot.rotation.z = (e*0.55)*s;
      a.arm.pivot.rotation.y = (e*0.25)*s;
    } else {
      setGuard(a.arm, s);
      activePunch = null;
    }
  }

  // ---- idle bob / weight shift ----
  const bob = Math.sin(t*3.2)*0.025;
  boxer.position.y = bob;
  boxer.rotation.y = Math.sin(t*1.1)*0.05;
  head.rotation.z = Math.sin(t*2.5)*0.04;
  // bounce legs slightly
  legL.position.y = Math.max(0, Math.sin(t*3.2)*0.03);
  legR.position.y = Math.max(0, Math.sin(t*3.2+Math.PI)*0.03);

  // ---- physique grows toward Force level (smooth, capped) ----
  const pt = physiqueTarget();
  if(Math.abs(pt - physShown) > 0.0005){
    physShown += (pt - physShown) * Math.min(1, dt*2.5);
    updatePhysique(physShown);
  }

  // ---- combo decay (frozen by Overdrive perk) ----
  if(combo > 0){
    if(comboFreeze > 0){ comboFreeze -= dt; comboTimer = comboWindow(); }
    else { comboTimer -= dt; if(comboTimer <= 0){ combo = 0; } }
    updateComboUI();
  }

  // ---- frenzy timer ----
  if(frenzyTimer > 0){
    frenzyTimer -= dt;
    frenzyTag.textContent = '⚡ CASH ×'+frenzyMult.toFixed(0)+'  ·  '+Math.ceil(frenzyTimer)+'s';
    if(frenzyTimer <= 0){ frenzyMult = 1; frenzyEl.classList.remove('on'); frenzyTag.classList.remove('on'); }
  }

  // ---- bag spring physics ----
  const k=18, damp=3.2;
  bagSwing.vx += (-k*bagSwing.x - damp*bagSwing.vx)*dt;
  bagSwing.vz += (-k*bagSwing.z - damp*bagSwing.vz)*dt;
  bagSwing.x += bagSwing.vx*dt;
  bagSwing.z += bagSwing.vz*dt;
  bagAnchor.rotation.x = -bagSwing.z*0.32;
  bagAnchor.rotation.z = bagSwing.x*0.32;

  // ---- particles ----
  for(const p of pPool){
    if(p.life>0){
      p.life -= dt;
      p.vel.y -= 7*dt; // gravity
      p.m.position.addScaledVector(p.vel, dt);
      p.m.material.opacity = Math.max(0, p.life*2);
      const sc = 0.6 + p.life;
      p.m.scale.setScalar(sc);
      if(p.life<=0){ p.m.visible=false; }
    }
  }

  // ---- ring pulse ----
  if(ringPulse>0){
    ringPulse = Math.max(0, ringPulse-dt*3);
    const r = window.__ring;
    r.scale.setScalar(1 + ringPulse*0.18);
    r.material.opacity = 0.5 + ringPulse*0.5;
  }

  // ---- camera shake + slow orbit ----
  if(shake>0) shake = Math.max(0, shake - dt*1.2);
  const orbit = Math.sin(t*0.18)*0.5;
  camera.position.set(
    camBase.x + orbit + (Math.random()-0.5)*shake,
    camBase.y + (Math.random()-0.5)*shake,
    camBase.z
  );
  camera.lookAt(camLook);

  renderer.render(scene, camera);
}

/* ===================================================================
   ECONOMY TICK + UI
=================================================================== */
const $ = id => document.getElementById(id);
function fmt(n){
  if(n<1000) return n<10 ? n.toFixed(1).replace(/\.0$/,'') : Math.floor(n).toString();
  const u=['','K','M','B','T','Qa','Qi']; let i=0;
  while(n>=1000 && i<u.length-1){ n/=1000; i++; }
  return n.toFixed(n<10?2:n<100?1:0)+u[i];
}

function refreshUI(){
  $('money').textContent = fmt(state.money);
  $('rate').textContent  = fmt(moneyPerHit()*punchRate());
  for(const k of ['force','stamina','income']){
    $('lvl-'+k).textContent = state[k];
    const c = COST[k](state[k]);
    $('cost-'+k).textContent = fmt(c);
    const btn = $('up-'+k);
    btn.classList.toggle('cant', state.money < c);
  }
  checkBagTier();
  updateQuestBadge();
  // fame chip
  $('fameMult').textContent = '×'+fameMult().toFixed(1);
  $('fameChip').classList.toggle('ready', prestigeGain() >= 1);
  if(sheetOpen === 'quests') renderQuests();   // live progress while open
}

function buy(k){
  const c = COST[k](state[k]);
  if(state.money < c){ navigator.vibrate?.(30); return; }
  state.money -= c;
  state[k] += 1;
  navigator.vibrate?.(12);
  const btn = $('up-'+k);
  btn.classList.remove('flash'); void btn.offsetWidth; btn.classList.add('flash');
  refreshUI(); save();
}
['force','stamina','income'].forEach(k=>{
  $('up-'+k).addEventListener('click', ()=>buy(k));
});

/* ===================================================================
   QUESTS
=================================================================== */
const QUESTS = [
  { id:'p100',  ic:'🥊', name:'Frappeur',        desc:'Tape 100 coups',     goal:100,   val:()=>state.stats.punches,   reward:200 },
  { id:'p1k',   ic:'🥊', name:'Cogneur',         desc:'Tape 1 000 coups',   goal:1000,  val:()=>state.stats.punches,   reward:2500 },
  { id:'p10k',  ic:'🥊', name:'Machine',         desc:'Tape 10 000 coups',  goal:10000, val:()=>state.stats.punches,   reward:30000 },
  { id:'c25',   ic:'🔥', name:'Combo Initié',    desc:'Atteins un combo ×25',  goal:25,  val:()=>state.stats.bestCombo, reward:1500 },
  { id:'c50',   ic:'🔥', name:'Combo Pro',       desc:'Atteins un combo ×50',  goal:50,  val:()=>state.stats.bestCombo, reward:6000 },
  { id:'c100',  ic:'🔥', name:'Combo Légende',   desc:'Atteins un combo ×100', goal:100, val:()=>state.stats.bestCombo, reward:40000 },
  { id:'f10',   ic:'💪', name:'Costaud',         desc:'Force niveau 10',    goal:10,    val:()=>state.force,           reward:4000 },
  { id:'f25',   ic:'💪', name:'Colosse',         desc:'Force niveau 25',    goal:25,    val:()=>state.force,           reward:50000 },
  { id:'m10k',  ic:'💰', name:'Premier magot',   desc:'Possède $10K',       goal:1e4,   val:()=>state.money,           reward:5000 },
  { id:'m1m',   ic:'💰', name:'Millionnaire',    desc:'Possède $1M',        goal:1e6,   val:()=>state.money,           reward:150000 },
];
const qReady = q => q.val() >= q.goal && !state.quests[q.id];
function updateQuestBadge(){
  const n = QUESTS.filter(qReady).length;
  const b = $('qBadge');
  b.textContent = n; b.classList.toggle('show', n>0);
}
function claimQuest(id){
  const q = QUESTS.find(x=>x.id===id);
  if(!q || !qReady(q)) return;
  state.quests[id] = true;
  gainMoney(q.reward);
  navigator.vibrate?.([15,30,15]);
  toast('Quête validée', '+$'+fmt(q.reward));
  renderQuests(); refreshUI(); save();
}
window.__claimQuest = claimQuest;
function renderQuests(){
  $('sheetBody').innerHTML = QUESTS.map(q=>{
    const v = q.val(), done = v >= q.goal, claimed = !!state.quests[q.id];
    const pct = Math.min(100, v/q.goal*100);
    const btn = claimed
      ? '<button class="claim" disabled>✓</button>'
      : (done ? '<button class="claim" onclick="__claimQuest(\''+q.id+'\')">Récolter</button>'
              : '<button class="claim" disabled>'+Math.floor(pct)+'%</button>');
    return '<div class="quest'+(claimed?' claimed':done?' done':'')+'">'+
      '<div class="qi">'+q.ic+'</div>'+
      '<div class="qb"><div class="qn">'+q.name+'</div><div class="qd">'+q.desc+'</div>'+
      '<div class="qbar"><i style="width:'+pct+'%"></i></div>'+
      '<div class="qr">Récompense : $'+fmt(q.reward)+'</div></div>'+
      btn+'</div>';
  }).join('');
}

/* ===================================================================
   STATS
=================================================================== */
function fmtTime(ms){
  const s=Math.floor(ms/1000), h=Math.floor(s/3600), m=Math.floor(s%3600/60);
  return h>0 ? h+'h '+m+'m' : m+'m '+(s%60)+'s';
}
function renderStats(){
  const st = state.stats;
  const cards = [
    ['Coups totaux', fmt(st.punches), 'cy'],
    ['Coups manuels', fmt(st.manual), 'mg'],
    ['Meilleur combo', '×'+st.bestCombo, 'mg'],
    ['Total gagné', '$'+fmt(st.earned), 'gr'],
    ['Revenu idle', '$'+fmt(moneyPerHit()*punchRate())+'/s', 'gr'],
    ['Cash actuel', '$'+fmt(state.money), ''],
    ['Force / Stam / Inc', state.force+' / '+state.stamina+' / '+state.income, 'cy'],
    ['Sac actuel', BAG_TIERS[bagTier].name, 'mg'],
    ['Renommée ⭐', state.fame+' (+'+Math.round((fameMult()-1)*100)+'%)', 'gr'],
    ['Temps de jeu', fmtTime(Date.now()-st.started), 'cy'],
  ];
  $('sheetBody').innerHTML = '<div class="stats-grid">'+cards.map(c=>
    '<div class="stat '+c[2]+'"><div class="sl">'+c[0]+'</div><div class="sv">'+c[1]+'</div></div>'
  ).join('')+'</div>';
}

/* ===================================================================
   PRESTIGE (Renommée)
=================================================================== */
let prestigeConfirm = false, prestigeConfirmTO = null;
function renderPrestige(){
  const g = prestigeGain();
  const curBonus = Math.round((fameMult()-1)*100);
  const newBonus = Math.round(((1+0.10*(state.fame+g))-1)*100);
  const next = (state.fame+1)*(state.fame+1)*PRESTIGE_BASE; // run needed for next +1 from 0
  const btn = g >= 1
    ? '<button class="pr-btn '+(prestigeConfirm?'confirm':'')+'" id="prBtn">'+(prestigeConfirm?'Confirmer la renaissance':'Renaître · +'+g+' ⭐')+'</button>'
    : '<button class="pr-btn" disabled>Gagne plus de cash d\'abord</button>';
  $('sheetBody').innerHTML =
    '<div class="pr-hero"><div class="big">⭐ '+state.fame+'</div><div class="sub">Renommée · +'+curBonus+'% revenus</div></div>'+
    '<div class="pr-rows">'+
      '<div class="pr-row"><span class="l">Gagné cette carrière</span><span class="v">$'+fmt(state.run)+'</span></div>'+
      '<div class="pr-row"><span class="l">Renommée à gagner</span><span class="v gain">+'+g+' ⭐</span></div>'+
      '<div class="pr-row"><span class="l">Nouveau bonus</span><span class="v gain">+'+newBonus+'%</span></div>'+
    '</div>'+ btn +
    '<div class="pr-note">Renaître remet à zéro cash, niveaux et sac.<br>Tu gardes Renommée, stats et quêtes — chaque ⭐ = +10% de revenus pour toujours.<br>Prochain seuil : $'+fmt(PRESTIGE_BASE)+' gagnés = 1ʳᵉ ⭐.</div>';
  const b = document.getElementById('prBtn');
  if(b) b.addEventListener('click', onPrestigeBtn);
}
function onPrestigeBtn(){
  if(prestigeGain() < 1) return;
  if(!prestigeConfirm){
    prestigeConfirm = true;
    clearTimeout(prestigeConfirmTO);
    prestigeConfirmTO = setTimeout(()=>{ prestigeConfirm=false; if(sheetOpen==='prestige') renderPrestige(); }, 3000);
    renderPrestige();
    return;
  }
  doPrestige();
}
function doPrestige(){
  const g = prestigeGain();
  if(g < 1) return;
  state.fame += g;
  // reset run progress
  state.money = 0; state.force = 1; state.stamina = 1; state.income = 1; state.run = 0;
  combo = 0; comboTimer = 0; comboFreeze = 0; updateComboUI();
  frenzyMult = 1; frenzyTimer = 0; frenzyEl.classList.remove('on'); frenzyTag.classList.remove('on');
  bagTier = -1;                 // re-evaluated to tier 0 by checkBagTier
  prestigeConfirm = false; clearTimeout(prestigeConfirmTO);
  refreshUI(); save();
  toast('Renaissance !', '+'+g+' ⭐ Renommée');
  closeSheet();
}
