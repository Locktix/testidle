<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0612" />
<title>NEON BOXER — Idle</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0a0612;
    --magenta:#ff2d75;
    --magenta-glow:#ff0080;
    --cyan:#00e5ff;
    --gold:#ffd23f;
    --green:#37ffb4;
    --ink:#f4ecff;
    --panel:rgba(22,12,38,.62);
    --panel-brd:rgba(255,255,255,.10);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:'Rajdhani',sans-serif;-webkit-user-select:none;user-select:none;}
  #app{position:fixed;inset:0;}
  canvas{display:block;position:fixed;inset:0;width:100%;height:100%;touch-action:none;cursor:pointer;}

  /* ===== Top HUD ===== */
  .hud-top{
    position:fixed;top:0;left:0;right:0;z-index:10;
    padding:calc(env(safe-area-inset-top) + 14px) 16px 10px;
    display:flex;flex-direction:column;align-items:center;gap:2px;
    pointer-events:none;
    background:linear-gradient(180deg,rgba(10,6,18,.85) 0%,rgba(10,6,18,0) 100%);
  }
  .brand{
    font-family:'Anton',sans-serif;font-size:13px;letter-spacing:.42em;
    text-transform:uppercase;color:var(--cyan);opacity:.85;
    text-shadow:0 0 12px var(--cyan);
    margin-left:.42em;
  }
  .money{
    font-family:'Anton',sans-serif;font-size:clamp(34px,11vw,52px);line-height:1;
    letter-spacing:.01em;color:var(--gold);
    text-shadow:0 0 22px rgba(255,210,63,.55),0 2px 0 rgba(0,0,0,.4);
    display:flex;align-items:baseline;gap:.12em;
  }
  .money .cur{font-size:.5em;opacity:.7;color:var(--gold);text-shadow:none;}
  .rate{
    font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:var(--green);text-shadow:0 0 14px rgba(55,255,180,.5);
  }
  .rate b{color:#fff;}
  .tap-hint{
    margin-top:4px;font-size:12px;font-weight:700;letter-spacing:.22em;
    text-transform:uppercase;color:var(--magenta);opacity:.9;
    text-shadow:0 0 12px var(--magenta-glow);
    animation:hintpulse 1.3s ease-in-out infinite;transition:opacity .5s;
  }
  @keyframes hintpulse{50%{opacity:.4;}}

  /* combo / hit popups projected over canvas */
  #popups{position:fixed;inset:0;z-index:8;pointer-events:none;overflow:hidden;}
  .pop{
    position:absolute;transform:translate(-50%,-50%);
    font-family:'Anton',sans-serif;font-size:22px;color:var(--gold);
    text-shadow:0 0 12px rgba(255,210,63,.8),0 2px 4px rgba(0,0,0,.6);
    animation:floatUp .9s ease-out forwards;white-space:nowrap;
  }
  @keyframes floatUp{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.6);}
    18%{opacity:1;transform:translate(-50%,-90%) scale(1.12);}
    100%{opacity:0;transform:translate(-50%,-220%) scale(.95);}
  }

  /* ===== Bottom upgrade dock ===== */
  .dock{
    position:fixed;left:0;right:0;bottom:0;z-index:10;
    padding:14px 12px calc(env(safe-area-inset-bottom) + 16px);
    display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
    background:linear-gradient(0deg,rgba(10,6,18,.92) 30%,rgba(10,6,18,0) 100%);
  }
  .up{
    position:relative;border:none;cursor:pointer;
    border-radius:18px;padding:13px 8px 11px;
    background:var(--panel);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid var(--panel-brd);
    box-shadow:0 8px 26px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.07);
    color:var(--ink);text-align:center;
    display:flex;flex-direction:column;align-items:center;gap:5px;
    transition:transform .08s ease, box-shadow .15s ease, filter .15s ease;
    overflow:hidden;
  }
  .up::before{
    content:"";position:absolute;inset:0;border-radius:18px;padding:1px;
    background:linear-gradient(160deg,var(--c) ,transparent 55%);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;opacity:.9;pointer-events:none;
  }
  .up:active{transform:translateY(2px) scale(.97);}
  .up.flash{animation:btnflash .4s ease;}
  @keyframes btnflash{0%{box-shadow:0 0 0 0 var(--c);}100%{box-shadow:0 0 0 14px transparent;}}
  .up.cant{filter:saturate(.45) brightness(.7);}
  .up .ic{
    width:42px;height:42px;border-radius:13px;display:grid;place-items:center;
    font-size:22px;
    background:radial-gradient(circle at 50% 35%,color-mix(in srgb,var(--c) 55%,transparent),transparent 70%);
    box-shadow:0 0 18px color-mix(in srgb,var(--c) 60%,transparent);
  }
  .up .nm{font-family:'Anton',sans-serif;font-size:13px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--c);text-shadow:0 0 10px color-mix(in srgb,var(--c) 70%,transparent);}
  .up .lv{font-size:12px;font-weight:700;letter-spacing:.05em;opacity:.7;text-transform:uppercase;}
  .up .cost{
    margin-top:2px;font-family:'Anton',sans-serif;font-size:15px;letter-spacing:.02em;
    color:#fff;display:flex;align-items:center;gap:3px;
  }
  .up .cost .c{color:var(--gold);font-size:.8em;}
  .up.cant .cost{color:var(--magenta);}

  /* boot / loader */
  #boot{position:fixed;inset:0;z-index:30;display:grid;place-items:center;
    background:radial-gradient(120% 90% at 50% 20%,#1a0a2e,#0a0612 70%);}
  #boot .t{font-family:'Anton',sans-serif;font-size:40px;letter-spacing:.18em;
    color:var(--magenta);text-shadow:0 0 26px var(--magenta-glow);text-align:center;}
  #boot .s{margin-top:10px;text-align:center;letter-spacing:.4em;font-size:12px;
    color:var(--cyan);text-transform:uppercase;animation:pulse 1.1s infinite;}
  @keyframes pulse{50%{opacity:.35;}}

  .g-toast{
    position:fixed;left:50%;top:38%;transform:translateX(-50%);z-index:20;
    background:var(--panel);border:1px solid var(--panel-brd);backdrop-filter:blur(14px);
    border-radius:16px;padding:16px 22px;text-align:center;pointer-events:none;
    box-shadow:0 10px 40px rgba(0,0,0,.6);animation:toast 3.4s ease forwards;
  }
  .g-toast .h{font-family:'Anton',sans-serif;color:var(--cyan);letter-spacing:.2em;font-size:14px;}
  .g-toast .v{font-family:'Anton',sans-serif;color:var(--gold);font-size:26px;margin-top:4px;}
  @keyframes toast{0%{opacity:0;transform:translate(-50%,10px);}10%,80%{opacity:1;transform:translate(-50%,0);}100%{opacity:0;transform:translate(-50%,-12px);}}
</style>
</head>
<body>
<div id="app"></div>

<div id="boot"><div><div class="t">NEON BOXER</div><div class="s">Entrée dans l'arène…</div></div></div>

<div class="hud-top">
  <div class="brand">Neon Boxer Club</div>
  <div class="money"><span class="cur">$</span><span id="money">0</span></div>
  <div class="rate">+<b id="rate">0</b>/s · idle</div>
  <div class="tap-hint" id="tapHint">👆 Tape l'écran pour frapper</div>
</div>

<div id="popups"></div>

<div class="dock">
  <button class="up" id="up-force" style="--c:var(--magenta)">
    <div class="ic">🥊</div>
    <div class="nm">Force</div>
    <div class="lv">Niv <span id="lvl-force">1</span></div>
    <div class="cost"><span class="c">$</span><span id="cost-force">10</span></div>
  </button>
  <button class="up" id="up-stamina" style="--c:var(--cyan)">
    <div class="ic">⚡</div>
    <div class="nm">Stamina</div>
    <div class="lv">Niv <span id="lvl-stamina">1</span></div>
    <div class="cost"><span class="c">$</span><span id="cost-stamina">15</span></div>
  </button>
  <button class="up" id="up-income" style="--c:var(--gold)">
    <div class="ic">💰</div>
    <div class="nm">Income</div>
    <div class="lv">Niv <span id="lvl-income">1</span></div>
    <div class="cost"><span class="c">$</span><span id="cost-income">25</span></div>
  </button>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

/* ===================================================================
   GAME STATE
=================================================================== */
const SAVE_KEY = 'neonboxer_save_v1';
const state = {
  money: 0,
  force: 1,    // damage tier
  stamina: 1,  // punch speed tier
  income: 1,   // money multiplier tier
  lastSeen: Date.now(),
};

const COST = {
  force:   l => Math.floor(10 * Math.pow(1.18, l - 1)),
  stamina: l => Math.floor(15 * Math.pow(1.20, l - 1)),
  income:  l => Math.floor(25 * Math.pow(1.26, l - 1)),
};
const damage      = () => state.force;
const incomeMult  = () => 1 + 0.25 * (state.income - 1);
const moneyPerHit = () => damage() * incomeMult();
const punchRate   = () => 0.9 + 0.13 * (state.stamina - 1); // punches / sec

function load(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return;
    const s = JSON.parse(raw);
    Object.assign(state, s);
    // offline earnings
    const dt = Math.min((Date.now() - (s.lastSeen||Date.now()))/1000, 8*3600);
    const earned = dt * moneyPerHit() * punchRate();
    if(earned > 1){ state.money += earned; pendingOffline = earned; }
  }catch(e){}
}
function save(){
  state.lastSeen = Date.now();
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }catch(e){}
}
let pendingOffline = 0;
load();

/* ===================================================================
   THREE.JS SCENE
=================================================================== */
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0612, 0.055);

const camera = new THREE.PerspectiveCamera(46, 1, 0.1, 100);
const camBase = new THREE.Vector3(3.6, 2.7, 5.4);
const camLook = new THREE.Vector3(0, 1.55, 1.1);
camera.position.copy(camBase);
camera.lookAt(camLook);

/* ---- gradient backdrop ---- */
{
  const c = document.createElement('canvas'); c.width=8; c.height=512;
  const g = c.getContext('2d').createLinearGradient(0,0,0,512);
  g.addColorStop(0,'#2a0f4a'); g.addColorStop(.45,'#160a2c'); g.addColorStop(1,'#070310');
  const ctx=c.getContext('2d'); ctx.fillStyle=g; ctx.fillRect(0,0,8,512);
  const tex = new THREE.CanvasTexture(c);
  scene.background = tex;
}

/* ---- lights ---- */
scene.add(new THREE.HemisphereLight(0x5a3a7a, 0x0a0612, 0.55));

const key = new THREE.SpotLight(0xff2d75, 60, 30, Math.PI/5, 0.4, 1.4);
key.position.set(-5, 8, 4); key.target.position.set(0,1.4,1.4);
key.castShadow = true; key.shadow.mapSize.set(1024,1024); key.shadow.bias=-0.0005;
scene.add(key, key.target);

const rim = new THREE.SpotLight(0x00e5ff, 45, 30, Math.PI/5, 0.5, 1.4);
rim.position.set(6, 6, -3); rim.target.position.set(0,1.4,1);
scene.add(rim, rim.target);

const fill = new THREE.DirectionalLight(0xffd23f, 0.5);
fill.position.set(2, 4, 6); scene.add(fill);

/* ---- floor (neon grid) ---- */
{
  const floor = new THREE.Mesh(
    new THREE.CircleGeometry(14, 48),
    new THREE.MeshStandardMaterial({ color:0x0d0820, roughness:.35, metalness:.7 })
  );
  floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; scene.add(floor);

  const grid = new THREE.GridHelper(28, 28, 0xff2d75, 0x2a1550);
  grid.position.y = 0.01;
  grid.material.transparent = true; grid.material.opacity = 0.35;
  scene.add(grid);

  // glowing platform ring under boxer
  const ring = new THREE.Mesh(
    new THREE.RingGeometry(1.5, 1.72, 64),
    new THREE.MeshBasicMaterial({ color:0x00e5ff, transparent:true, opacity:.8, side:THREE.DoubleSide })
  );
  ring.rotation.x = -Math.PI/2; ring.position.y = 0.02; scene.add(ring);
  window.__ring = ring;
}

/* ---- materials ---- */
const MAT = {
  skin:   new THREE.MeshStandardMaterial({ color:0xc77b52, roughness:.7 }),
  trunk:  new THREE.MeshStandardMaterial({ color:0x12203a, roughness:.5, metalness:.2 }),
  trim:   new THREE.MeshStandardMaterial({ color:0x00e5ff, emissive:0x00788a, emissiveIntensity:.8, roughness:.4 }),
  glove:  new THREE.MeshStandardMaterial({ color:0xff2d75, emissive:0xff0050, emissiveIntensity:.6, roughness:.45 }),
  boot:   new THREE.MeshStandardMaterial({ color:0xf4ecff, roughness:.6 }),
  bag:    new THREE.MeshStandardMaterial({ color:0x7a1030, roughness:.55, metalness:.15 }),
  bagband:new THREE.MeshStandardMaterial({ color:0xffd23f, emissive:0x8a6a00, emissiveIntensity:.7, roughness:.4 }),
  chain:  new THREE.MeshStandardMaterial({ color:0x888899, metalness:.9, roughness:.3 }),
};
const cap = (r,h,m)=>{ const g=new THREE.CapsuleGeometry(r,h,6,12); const me=new THREE.Mesh(g,m); me.castShadow=true; return me; };
const box = (w,h,d,m)=>{ const me=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m); me.castShadow=true; return me; };
const sph = (r,m)=>{ const me=new THREE.Mesh(new THREE.SphereGeometry(r,16,16),m); me.castShadow=true; return me; };

/* ===================================================================
   BOXER RIG  (faces +Z toward bag)
=================================================================== */
const boxer = new THREE.Group(); scene.add(boxer);

// torso
const torso = cap(0.34, 0.55, MAT.trunk); torso.position.y = 1.5; boxer.add(torso);
const beltTrim = box(0.7,0.12,0.42, MAT.trim); beltTrim.position.y=1.22; boxer.add(beltTrim);
// hips/shorts
const hips = box(0.62,0.4,0.42, MAT.trunk); hips.position.y=1.05; boxer.add(hips);

// head
const head = sph(0.24, MAT.skin); head.position.y=2.08; boxer.add(head);
const headguard = new THREE.Mesh(new THREE.TorusGeometry(0.25,0.05,8,20), MAT.glove);
headguard.position.set(0,2.12,0); headguard.rotation.x=Math.PI/2; boxer.add(headguard);

// legs
function leg(x){
  const g = new THREE.Group();
  const thigh = cap(0.15,0.4,MAT.skin); thigh.position.y=0.78; g.add(thigh);
  const shin  = cap(0.13,0.4,MAT.skin); shin.position.y=0.32; g.add(shin);
  const boot  = box(0.26,0.18,0.42,MAT.boot); boot.position.set(0,0.08,0.06); g.add(boot);
  g.position.x = x; boxer.add(g); return g;
}
const legL = leg(-0.2), legR = leg(0.22);
legL.position.z = 0.05; legR.position.z = -0.18; // slight stagger / stance

// arms — pivot at shoulder
function arm(side){ // side: -1 left, +1 right
  const pivot = new THREE.Group();
  pivot.position.set(0.42*side, 1.72, 0);
  const upper = cap(0.12,0.32,MAT.skin); upper.position.y=-0.26; pivot.add(upper);
  const fore  = cap(0.115,0.30,MAT.skin); fore.position.y=-0.62; pivot.add(fore);
  const glove = sph(0.2,MAT.glove); glove.position.y=-0.92; pivot.add(glove);
  const wrist = new THREE.Mesh(new THREE.TorusGeometry(0.15,0.04,8,16),MAT.trim);
  wrist.position.y=-0.8; wrist.rotation.x=Math.PI/2; pivot.add(wrist);
  boxer.add(pivot);
  return { pivot, glove };
}
const armL = arm(-1), armR = arm(1);

// guard pose (resting): elbows in, gloves up near face
function setGuard(a, side){
  a.pivot.rotation.set(-1.15, 0.25*side, 0.55*side);
}
setGuard(armL,-1); setGuard(armR,1);

boxer.position.z = -0.4;

/* ===================================================================
   HEAVY BAG
=================================================================== */
const bagAnchor = new THREE.Group(); // top pivot for swing
bagAnchor.position.set(0, 3.4, 1.9);
scene.add(bagAnchor);

const chain = new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,0.5,8), MAT.chain);
chain.position.y = -0.25; bagAnchor.add(chain);

const bag = new THREE.Group(); bag.position.y = -0.5; bagAnchor.add(bag);
const bagBody = cap(0.42, 1.0, MAT.bag); bagBody.position.y = -0.95; bag.add(bagBody);
for(let i=0;i<3;i++){
  const band = new THREE.Mesh(new THREE.TorusGeometry(0.43,0.05,8,24), MAT.bagband);
  band.position.y = -0.55 - i*0.5; band.rotation.x=Math.PI/2; bag.add(band);
}
// support beam
{
  const beam = box(0.18,0.18,2.2, MAT.chain); beam.position.set(0,3.45,1.4); scene.add(beam);
  const post = box(0.18,3.6,0.18, MAT.chain); post.position.set(0,1.8,0.3); scene.add(post);
}

let bagSwing = { x:0, z:0, vx:0, vz:0 };

/* ===================================================================
   PARTICLES (impact burst pool)
=================================================================== */
const PCOUNT = 60;
const pPool = [];
const pGeo = new THREE.SphereGeometry(0.06, 6, 6);
for(let i=0;i<PCOUNT;i++){
  const m = new THREE.Mesh(pGeo, new THREE.MeshBasicMaterial({ color:0xffd23f, transparent:true }));
  m.visible=false; scene.add(m);
  pPool.push({ m, life:0, vel:new THREE.Vector3() });
}
let pIdx=0;
const impactColors = [0xffd23f, 0xff2d75, 0x00e5ff, 0xffffff];
function burst(pos, big){
  const n = (big?16:10) + Math.floor(Math.random()*6);
  for(let i=0;i<n;i++){
    const p = pPool[pIdx]; pIdx=(pIdx+1)%PCOUNT;
    p.m.position.copy(pos);
    p.m.material.color.setHex(impactColors[(Math.random()*impactColors.length)|0]);
    p.m.material.opacity=1; p.m.visible=true;
    const sp = 2 + Math.random()*3;
    p.vel.set((Math.random()-0.5)*sp, Math.random()*sp*0.9+0.5, (Math.random()-0.5)*sp + 1.5);
    p.life = 0.5 + Math.random()*0.3;
  }
}

/* ===================================================================
   PUNCH + IMPACT LOGIC
=================================================================== */
let punchCd = 1.0;
let activePunch = null;   // {arm, side, t, hit, manual}
let nextManual = true;    // alternate arms on manual taps
const gloveWorld = new THREE.Vector3();
const punchAnimSpeed = () => 6.5 + (state.stamina - 1) * 0.7; // taps feel snappier w/ stamina

function triggerPunch(manual){
  let right;
  if(manual){ right = nextManual; nextManual = !nextManual; }
  else right = Math.random() > 0.5;
  activePunch = { arm: right?armR:armL, side: right?1:-1, t:0, hit:false, manual:!!manual };
}

// ---- player tap = punch ----
function playerPunch(){
  if(activePunch) return;          // wait for current jab to finish
  triggerPunch(true);
}
window.addEventListener('pointerdown', (e)=>{
  if(e.target.closest('.dock')) return;   // don't punch when tapping upgrade buttons
  playerPunch();
}, { passive:true });

let firstTap = true;
function onImpact(){
  const manual = activePunch.manual;
  const gain = moneyPerHit() * (manual ? 1.5 : 1);   // reward active play
  state.money += gain;

  activePunch.arm.glove.getWorldPosition(gloveWorld);
  burst(gloveWorld, manual);
  popup(gloveWorld, '+$'+fmt(gain));

  // shove bag (manual hits harder)
  const power = manual ? 1.5 : 1;
  bagSwing.vz += (4.2 + damage()*0.04) * power;
  bagSwing.vx += (Math.random()-0.5)*1.5;
  shake = Math.min(0.3, (manual?0.18:0.12) + damage()*0.002);
  ringPulse = 1;

  if(manual && firstTap){
    firstTap = false;
    const h = document.getElementById('tapHint');
    if(h){ h.style.opacity='0'; setTimeout(()=>h.remove(), 600); }
  }
}

/* ===================================================================
   FLOATING POPUPS (DOM projected)
=================================================================== */
const popLayer = document.getElementById('popups');
const _v = new THREE.Vector3();
function popup(pos3, text){
  _v.copy(pos3).project(camera);
  const x = (_v.x*0.5+0.5)*window.innerWidth;
  const y = (-_v.y*0.5+0.5)*window.innerHeight;
  const el = document.createElement('div');
  el.className='pop'; el.textContent=text;
  el.style.left=x+'px'; el.style.top=y+'px';
  el.style.color = Math.random()>0.7 ? 'var(--cyan)' : 'var(--gold)';
  popLayer.appendChild(el);
  setTimeout(()=>el.remove(), 900);
}

/* ===================================================================
   RENDER LOOP
=================================================================== */
let shake=0, ringPulse=0;
const clock = new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  // ---- punch scheduling ----
  punchCd -= dt;
  if(punchCd <= 0 && !activePunch){
    triggerPunch();
    punchCd = 1 / punchRate();
  }

  // ---- punch animation ----
  if(activePunch){
    const a = activePunch; a.t += dt * (a.manual ? punchAnimSpeed()*1.25 : punchAnimSpeed());
    const s = a.side;
    if(a.t < 1){
      // extend toward bag: ease out
      const e = 1 - Math.pow(1-a.t, 3);
      a.arm.pivot.rotation.x = -1.15 + e*1.05;        // swing forward
      a.arm.pivot.rotation.z = (0.55 - e*0.55)*s;      // straighten
      a.arm.pivot.rotation.y = (0.25 - e*0.25)*s;
      if(e > 0.82 && !a.hit){ a.hit=true; onImpact(); }
    } else if(a.t < 2){
      // retract back to guard
      const e = a.t-1;
      a.arm.pivot.rotation.x = -1.15 + (1-e)*1.05;
      a.arm.pivot.rotation.z = (e*0.55)*s;
      a.arm.pivot.rotation.y = (e*0.25)*s;
    } else {
      setGuard(a.arm, s);
      activePunch = null;
    }
  }

  // ---- idle bob / weight shift ----
  const bob = Math.sin(t*3.2)*0.025;
  boxer.position.y = bob;
  boxer.rotation.y = Math.sin(t*1.1)*0.05;
  head.rotation.z = Math.sin(t*2.5)*0.04;
  // bounce legs slightly
  legL.position.y = Math.max(0, Math.sin(t*3.2)*0.03);
  legR.position.y = Math.max(0, Math.sin(t*3.2+Math.PI)*0.03);

  // ---- bag spring physics ----
  const k=18, damp=3.2;
  bagSwing.vx += (-k*bagSwing.x - damp*bagSwing.vx)*dt;
  bagSwing.vz += (-k*bagSwing.z - damp*bagSwing.vz)*dt;
  bagSwing.x += bagSwing.vx*dt;
  bagSwing.z += bagSwing.vz*dt;
  bagAnchor.rotation.x = -bagSwing.z*0.32;
  bagAnchor.rotation.z = bagSwing.x*0.32;

  // ---- particles ----
  for(const p of pPool){
    if(p.life>0){
      p.life -= dt;
      p.vel.y -= 7*dt; // gravity
      p.m.position.addScaledVector(p.vel, dt);
      p.m.material.opacity = Math.max(0, p.life*2);
      const sc = 0.6 + p.life;
      p.m.scale.setScalar(sc);
      if(p.life<=0){ p.m.visible=false; }
    }
  }

  // ---- ring pulse ----
  if(ringPulse>0){
    ringPulse = Math.max(0, ringPulse-dt*3);
    const r = window.__ring;
    r.scale.setScalar(1 + ringPulse*0.18);
    r.material.opacity = 0.5 + ringPulse*0.5;
  }

  // ---- camera shake + slow orbit ----
  if(shake>0) shake = Math.max(0, shake - dt*1.2);
  const orbit = Math.sin(t*0.18)*0.5;
  camera.position.set(
    camBase.x + orbit + (Math.random()-0.5)*shake,
    camBase.y + (Math.random()-0.5)*shake,
    camBase.z
  );
  camera.lookAt(camLook);

  renderer.render(scene, camera);
}

/* ===================================================================
   ECONOMY TICK + UI
=================================================================== */
const $ = id => document.getElementById(id);
function fmt(n){
  if(n<1000) return n<10 ? n.toFixed(1).replace(/\.0$/,'') : Math.floor(n).toString();
  const u=['','K','M','B','T','Qa','Qi']; let i=0;
  while(n>=1000 && i<u.length-1){ n/=1000; i++; }
  return n.toFixed(n<10?2:n<100?1:0)+u[i];
}

function refreshUI(){
  $('money').textContent = fmt(state.money);
  $('rate').textContent  = fmt(moneyPerHit()*punchRate());
  for(const k of ['force','stamina','income']){
    $('lvl-'+k).textContent = state[k];
    const c = COST[k](state[k]);
    $('cost-'+k).textContent = fmt(c);
    const btn = $('up-'+k);
    btn.classList.toggle('cant', state.money < c);
  }
}

function buy(k){
  const c = COST[k](state[k]);
  if(state.money < c){ navigator.vibrate?.(30); return; }
  state.money -= c;
  state[k] += 1;
  navigator.vibrate?.(12);
  const btn = $('up-'+k);
  btn.classList.remove('flash'); void btn.offsetWidth; btn.classList.add('flash');
  refreshUI(); save();
}
['force','stamina','income'].forEach(k=>{
  $('up-'+k).addEventListener('click', ()=>buy(k));
});

// UI refresh + autosave
setInterval(refreshUI, 120);
setInterval(save, 5000);
window.addEventListener('beforeunload', save);
document.addEventListener('visibilitychange', ()=>{ if(document.hidden) save(); });

/* ===================================================================
   RESIZE
=================================================================== */
function resize(){
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w,h,false);
  camera.aspect = w/h; camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

/* ===================================================================
   BOOT
=================================================================== */
animate();
refreshUI();
setTimeout(()=>{ document.getElementById('boot').style.transition='opacity .5s'; document.getElementById('boot').style.opacity='0'; setTimeout(()=>document.getElementById('boot').remove(),500); }, 700);

if(pendingOffline > 1){
  setTimeout(()=>{
    const t=document.createElement('div');
    t.className='g-toast';
    t.innerHTML='<div class="h">De retour au ring</div><div class="v">+$'+fmt(pendingOffline)+'</div>';
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),3400);
  }, 1000);
}
